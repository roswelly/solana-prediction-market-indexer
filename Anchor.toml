[toolchain]
anchor_version = "0.30.1"
solana_version = "1.18.17"

[features]
resolution = true
skip-lint = false

[programs.localnet]
prediction_market = "PMrkt1111111111111111111111111111111111111"

[programs.devnet]
prediction_market = "PMrkt1111111111111111111111111111111111111"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 programs/prediction-market/tests/*.ts"

[test.validator]
url = "https://api.devnet.solana.com"
