version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: spmi
      POSTGRES_PASSWORD: spmi
      POSTGRES_DB: spmi
    ports: ['5432:5432']
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./packages/indexer/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U spmi']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports: ['6379:6379']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  indexer:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: indexer
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports: ['9464:9464']

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: api
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports: ['4000:4000']

  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
